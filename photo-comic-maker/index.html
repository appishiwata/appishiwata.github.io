<!DOCTYPE html>

<head>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {

      color: #1d1d1f;
      min-height: 100vh;
    }
    .wrap { max-width: 720px; margin: 0 auto; padding: 24px 24px 80px; }
    .hero {
      background: #fff;
      border-radius: 20px;
      padding: 40px 32px 36px;
      margin-top: 0;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.07);
    }
    .hero-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      margin-bottom: 4px;
    }
    .platform-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 600;
      color: #6e6e73;
      background: #f5f5f7;
      border-radius: 20px;
      padding: 4px 10px;
      margin-bottom: 24px;
    }
    .platform-badge svg { width: 13px; height: 13px; fill: #6e6e73; flex-shrink: 0; }
    .app-icon {
      display: block;
      width: 112px;
      height: 112px;
      border-radius: 24px;
      margin-bottom: 20px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.4px;

      color: #424245;

      margin-bottom: 28px;
    }
    .features {
      text-align: left;
      border-top: 1px solid #e5e5ea;
      padding-top: 24px;
    }
    .features h2 {
      font-size: 14px;
      font-weight: 600;
      color: #6e6e73;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 14px;
    }
    .features ul {
      list-style: none;
      font-size: 15px;
      line-height: 1.7;
      color: #424245;
    }
    .features li {
      padding-left: 22px;
      position: relative;
      margin-bottom: 10px;
    }
    .features li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0.55em;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #0071e3;
    }
    .cta {
      margin-top: 28px;
      text-align: center;
    }
    .app-link {
      display: inline-block;
      background: #1d1d1f;
      color: #fff;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      padding: 12px 28px;
      border-radius: 980px;
    }
    .lang-switch {
      text-align: center;
      margin-top: 16px;
      font-size: 14px;
    }
    .lang-switch a {
      color: #0071e3;
      text-decoration: none;
    }
    .lang-switch a:hover { text-decoration: underline; }
    footer {
      text-align: center;
      margin-top: 48px;
      font-size: 13px;
      color: #aeaeb2;
    }
    footer a { color: #aeaeb2; }

        </ul>
      </div>
      <div class="cta">

      </div>
      <p class="lang-switch"><a href="../photo-comic-maker-en/">English</a></p>

      <p style="margin-bottom: 8px;"><a href="./privacy-policy/">プライバシーポリシー</a></p>
      <p>&copy; 2026 appishiwata</p>
    </footer>

</html>
