  <style>

      font-weight: 600;
      color: #6e6e73;
      text-transform: uppercase;

      margin-bottom: 14px;
    }
    .features ul {
      list-style: none;
      font-size: 15px;
      line-height: 1.7;
      color: #424245;
    }
    .features li {
      padding-left: 22px;
      position: relative;
      margin-bottom: 10px;
    }
    .features li::before {
      content: '';

      left: 0;
      top: 0.55em;
      width: 6px;
      height: 6px;

      text-align: center;
